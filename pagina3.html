<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pré-declaração</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #1e3c72, #2a5298); /* tons de azul */
      color: #fff;
      font-family: 'Georgia', serif;
      text-align: center;
      padding: 20px;
    }
    .texto {
      font-size: 1.4em;
      max-width: 90%;
      line-height: 1.6;
      opacity: 0;
      animation: fadeIn 3s forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .carta {
      margin-top: 40px;
      width: 120px;
      height: 80px;
      background: #0d6efd;
      border-radius: 8px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .selo {
      position: absolute;
      bottom: -20px;
      background: #ffc107;
      color: #000;
      border: none;
      padding: 10px 15px;
      border-radius: 50%;
      font-size: 1.2em;
      cursor: pointer;
    }
    .selo:hover {
      background: #ffcd39;
    }
  </style>
</head>
<body>
  <div class="texto">
    “Eu não apenas me apaixonei por ti, eu passei a enxergar você em cada detalhe daquilo que me faz viver.  
    Você se tornou presença nas minhas paixões, inspiração nos meus sonhos e razão nos meus sorrisos.”
  </div>

  <div class="carta">
    <button class="selo" onclick="irParaPagina4()">📜</button>
  </div>

  <script>
    function irParaPagina4() {
      window.location.href = "pagina4.html";
    }
  </script>
</body>
</html>
