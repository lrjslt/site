<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boas-vindas</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #1e3c72, #2a5298); /* tons de azul */
      color: #ffffff;
      font-family: 'Georgia', serif;
      text-align: center;
      padding: 20px;
    }
    .frase {
      font-size: 1.5em;
      max-width: 90%;
      line-height: 1.5;
    }
    .autor {
      margin-top: 10px;
      font-size: 1.2em;
      opacity: 0.8;
    }
    .seta {
      margin-top: 40px;
      font-size: 2em;
      cursor: pointer;
      animation: bounce 1.5s infinite;
    }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-10px);}
      60% {transform: translateY(-5px);}
    }
    a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
<body>
  <div class="frase">“Amar é estar em ti sem deixar de ser eu.”</div>
  <div class="autor">– Fernando Pessoa</div>
  
  <!-- seta para próxima página -->
  <div class="seta">
    <a href="pagina2.html">⬇</a>
  </div>
</body>
</html>
